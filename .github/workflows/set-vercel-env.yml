name: Set Vercel Environment Variables

on:
  workflow_dispatch:  # Run manually from GitHub Actions tab

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Set UPSTASH_REDIS_REST_URL
        run: |
          echo "${{ secrets.UPSTASH_REDIS_REST_URL }}" | vercel env add UPSTASH_REDIS_REST_URL production --token=${{ secrets.VERCEL_TOKEN }} --yes 2>/dev/null || \
          vercel env rm UPSTASH_REDIS_REST_URL production --token=${{ secrets.VERCEL_TOKEN }} --yes 2>/dev/null && \
          echo "${{ secrets.UPSTASH_REDIS_REST_URL }}" | vercel env add UPSTASH_REDIS_REST_URL production --token=${{ secrets.VERCEL_TOKEN }} --yes

      - name: Set UPSTASH_REDIS_REST_TOKEN
        run: |
          echo "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" | vercel env add UPSTASH_REDIS_REST_TOKEN production --token=${{ secrets.VERCEL_TOKEN }} --yes 2>/dev/null || \
          vercel env rm UPSTASH_REDIS_REST_TOKEN production --token=${{ secrets.VERCEL_TOKEN }} --yes 2>/dev/null && \
          echo "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" | vercel env add UPSTASH_REDIS_REST_TOKEN production --token=${{ secrets.VERCEL_TOKEN }} --yes

      - name: Set DASHBOARD_SECRET
        run: |
          echo "51432" | vercel env add DASHBOARD_SECRET production --token=${{ secrets.VERCEL_TOKEN }} --yes 2>/dev/null || \
          vercel env rm DASHBOARD_SECRET production --token=${{ secrets.VERCEL_TOKEN }} --yes 2>/dev/null && \
          echo "51432" | vercel env add DASHBOARD_SECRET production --token=${{ secrets.VERCEL_TOKEN }} --yes

      - name: Done
        run: echo "✅ Vercel env vars set. Trigger a redeploy on Vercel for changes to take effect."
