name: Set Vercel Environment Variables

on:
  workflow_dispatch:

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # upsert_env: remove if exists (ignore error), then add fresh
      - name: Set UPSTASH_REDIS_REST_URL
        run: |
          vercel env rm UPSTASH_REDIS_REST_URL production \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_SCOPE }} \
            --yes 2>/dev/null || true
          echo "${{ secrets.UPSTASH_REDIS_REST_URL }}" | vercel env add UPSTASH_REDIS_REST_URL production \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_SCOPE }} \
            --yes

      - name: Set UPSTASH_REDIS_REST_TOKEN
        run: |
          vercel env rm UPSTASH_REDIS_REST_TOKEN production \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_SCOPE }} \
            --yes 2>/dev/null || true
          echo "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" | vercel env add UPSTASH_REDIS_REST_TOKEN production \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_SCOPE }} \
            --yes

      - name: Set DASHBOARD_SECRET
        run: |
          vercel env rm DASHBOARD_SECRET production \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_SCOPE }} \
            --yes 2>/dev/null || true
          echo "51432" | vercel env add DASHBOARD_SECRET production \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_SCOPE }} \
            --yes

      - name: Done
        run: echo "✅ Vercel env vars set. Trigger a redeploy on Vercel for changes to take effect."
