name: Scraper — Pull Live Incentive Data

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Scraper mode"
        required: false
        default: "live"
        type: choice
        options: [live, mock]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run scrapers
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCRAPER_MOCK_MODE: "false"
        run: python3 -m scrapers.scheduler --once --live

      - name: Upload scrape log as artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-${{ github.run_id }}
          path: /tmp/scrape.log
          retention-days: 7
