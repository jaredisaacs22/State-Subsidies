name: Scraper — Pull Live Incentive Data

on:
  schedule:
    # Twice daily — 6h cadence was over-trafficking sources for marginal
    # freshness. 12h still beats every source's update cadence.
    - cron: "0 7,19 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Scraper mode"
        required: false
        default: "live"
        type: choice
        options: [live, mock]

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Contract tests (SS-002 §7.1 — blocking gate)
        # Parsers must satisfy golden fixtures before any scrape runs.
        # A failure here means the parser changed in a way that would
        # poison the DB — block the scrape, do not write rows.
        run: python3 -m pytest tests/ -v

      - name: Run scrapers (SS-002 §9 step 8 — live writes enabled)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCRAPER_MOCK_MODE: "false"
          DRY_RUN: "0"
        run: python3 -m scrapers.scheduler --once --live 2>&1 | tee /tmp/scrape.log

      - name: Upload scrape log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-${{ github.run_id }}
          path: /tmp/scrape.log
          retention-days: 7

      - name: Upload dry-run report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-report-${{ github.run_id }}
          path: /tmp/scrape-report.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Trigger production redeploy
        # Refreshes /data/stats.json (precomputed at build time) so home +
        # map pages reflect newly-scraped programs. Skipped if no hook URL
        # is configured — set VERCEL_DEPLOY_HOOK_URL in repo secrets.
        # Create at https://vercel.com/[team]/[project]/settings/git
        if: success()
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${DEPLOY_HOOK}" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK_URL not set — skipping redeploy. Static stats won't refresh until next push to main."
            exit 0
          fi
          echo "→ Triggering Vercel redeploy"
          curl -fsS -X POST "$DEPLOY_HOOK" -o /tmp/deploy-trigger.json
          cat /tmp/deploy-trigger.json
          echo ""
          echo "Deploy queued. /data/stats.json will refresh once the build completes."
