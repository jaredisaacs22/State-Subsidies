name: Migrate Baseline (one-time)

# Marks 0_init as already-applied on a DB that was set up with db push.
# Safe to run multiple times — skips gracefully if 0_init is already recorded.
# Trigger: GitHub → Actions → Migrate Baseline (one-time) → Run workflow

on:
  workflow_dispatch:

jobs:
  baseline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Diagnose — check secret and URL shape
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ DATABASE_URL_UNPOOLED secret is not set."
            echo "   Go to: GitHub repo → Settings → Secrets → Actions → Repository secrets"
            echo "   Name:  DATABASE_URL_UNPOOLED"
            echo "   Value: from Vercel → Storage → DB → .env.local → POSTGRES_URL_NON_POOLING"
            exit 1
          fi
          CHARS=${#DATABASE_URL}
          echo "✅ DATABASE_URL_UNPOOLED is set ($CHARS chars)"
          if echo "$DATABASE_URL" | grep -q "\-pooler"; then
            echo "❌ URL contains '-pooler' — this is the pooled URL. Must use the direct/unpooled URL."
            exit 1
          fi
          echo "✅ URL does not contain '-pooler' (direct connection confirmed)"
          HOST=$(echo "$DATABASE_URL" | sed 's/.*@\([^:/]*\).*/\1/')
          PORT=$(echo "$DATABASE_URL" | sed 's/.*:\([0-9]*\)\/.*/\1/')
          echo "   Host: $HOST  Port: $PORT"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Resolve 0_init as applied (idempotent)
        run: |
          OUTPUT=$(npx prisma migrate resolve --applied "0_init" 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "already"; then
            echo "ℹ️  0_init is already recorded as applied — nothing to do."
          elif echo "$OUTPUT" | grep -qi "error\|failed\|ERR"; then
            echo "❌ migrate resolve failed — see output above."
            exit 1
          else
            echo "✅ 0_init marked as applied."
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}

      - name: Verify — migration status (informational)
        # || true: prisma migrate status exits 1 if any migrations are pending.
        # After baseline, 1_add_scrape_run will appear pending until db-init runs.
        # This step is diagnostic only — do NOT fail the baseline job on pending migrations.
        run: npx prisma migrate status || true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}
