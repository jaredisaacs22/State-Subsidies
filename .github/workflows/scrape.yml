name: Scrape Incentives

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 6am UTC
  workflow_dispatch:          # allow manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run scrapers (mock mode)
        # Use --mock until live scraper targets are validated stable.
        # KEEP --mock. Live scraper data is not quality-controlled.
        # Add new programs manually to prisma/seed-ca-programs.ts or seed-other-programs.ts.
        run: python -m scrapers.runner --mock --output /tmp/incentives.json

      - name: Write scraped data to database
        run: |
          python - <<'EOF'
          import json
          from scrapers.db_writer import bulk_upsert
          from scrapers.models import ScrapedIncentive

          with open("/tmp/incentives.json") as f:
              raw = json.load(f)

          incentives = [ScrapedIncentive(**item) for item in raw]
          stats = bulk_upsert(incentives)
          print(f"Done — inserted: {stats['inserted']}, updated: {stats['updated']}, errors: {stats['errors']}")
          EOF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}
