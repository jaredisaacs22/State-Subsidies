name: Initialize Database

# Applies pending migrations then reseeds the database.
# Safe to re-run — migrations are idempotent, seed uses upsert.
# Trigger: GitHub → Actions → Initialize Database → Run workflow

on:
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Diagnose — check secret and URL shape
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ DATABASE_URL_UNPOOLED secret is not set."
            echo "   Go to: GitHub repo → Settings → Secrets → Actions → Repository secrets"
            echo "   Name:  DATABASE_URL_UNPOOLED"
            echo "   Value: from Vercel → Storage → DB → .env.local → POSTGRES_URL_NON_POOLING"
            exit 1
          fi
          CHARS=${#DATABASE_URL}
          echo "✅ DATABASE_URL_UNPOOLED is set ($CHARS chars)"
          if echo "$DATABASE_URL" | grep -q "\-pooler"; then
            echo "❌ URL contains '-pooler' — this is the pooled URL. Must use the direct/unpooled URL."
            exit 1
          fi
          echo "✅ URL does not contain '-pooler' (direct connection confirmed)"
          HOST=$(echo "$DATABASE_URL" | sed 's/.*@\([^:/]*\).*/\1/')
          PORT=$(echo "$DATABASE_URL" | sed 's/.*:\([0-9]*\)\/.*/\1/')
          echo "   Host: $HOST  Port: $PORT"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Test DB connection (fail fast with real error)
        run: |
          node -e "
          const { PrismaClient } = require('@prisma/client');
          const p = new PrismaClient({ log: ['error', 'warn'] });
          (async () => {
            try {
              await p.\$connect();
              const result = await p.\$queryRawUnsafe('SELECT current_database() AS db, current_user AS user, version() AS version');
              console.log('✅ DB connection succeeded');
              console.log('   db      :', result[0].db);
              console.log('   user    :', result[0].user);
              console.log('   version :', result[0].version.split(' ').slice(0,2).join(' '));
              await p.\$disconnect();
              process.exit(0);
            } catch (e) {
              console.error('❌ DB connection FAILED');
              console.error('   Error:', e.message);
              console.error('   Code :', e.code || 'n/a');
              if (e.meta) console.error('   Meta :', JSON.stringify(e.meta));
              process.exit(1);
            }
          })();
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}

      - name: Show migration status (pre-deploy diagnostic)
        # Informational — shows what is pending before we attempt to apply.
        # Exits 1 for pending migrations by design; || true prevents failure.
        run: npx prisma migrate status || true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}

      - name: Apply migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}

      - name: Seed database
        # Direct ts-node invocation — npm run db:seed had path issues on
        # some runners. Use --transpile-only to skip type-checking (seed
        # has thousands of records; type-check adds 30s+ for no gain).
        run: npx ts-node --transpile-only --compiler-options "{\"module\":\"CommonJS\"}" prisma/seed.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}
