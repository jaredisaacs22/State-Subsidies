name: CI — PR Gates

# SS-002/SS-005/SS-010 foundation hardening:
# every PR (and every push to main) must pass these gates before merge.
# Nothing here writes to production resources.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs when a PR pushes again — saves CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: scraper contract tests (SS-002 §7.1) ─────────────────────────
  pytest:
    name: pytest (scraper contract tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Run pytest
        run: python3 -m pytest tests/ -v

  # ── TypeScript: type-check + lint + SS-005 §10 grep gate ─────────────────
  typecheck:
    name: typecheck + lint + grep gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install Node dependencies
        run: npm ci
      - name: Generate Prisma client (typegen)
        run: npx prisma generate
      - name: TypeScript type-check
        run: npx tsc --noEmit
      - name: ESLint
        # Permissive on warnings initially — failure on errors only.
        # Tighten with --max-warnings 0 once warnings are zero.
        run: npx next lint
      # SS-005 §10 — no hardcoded billion-dollar headline figures in app/
      - name: Hardcoded-numbers grep gate (SS-005 §10)
        run: |
          if grep -rE '\$[0-9]+(\.[0-9]+)?B\+' app/ ; then
            echo "::error::SS-005 §10 — hardcoded billion-dollar figure found in app/. Use <Stat> with live DB data."
            exit 1
          fi
          echo "PASS: no hardcoded \$XB+ figures in app/"

  # ── Prisma: schema ↔ migrations drift gate (SS-010) ───────────────────────
  # Prevents the "schema.prisma changed but no migration was added" failure
  # mode that would silently skip schema updates in production.
  prisma-drift:
    name: prisma migration drift
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shadow
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install Node dependencies
        run: npm ci
      - name: Verify schema ↔ migrations are in sync
        env:
          SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shadow
        run: |
          # Diff: starting from the migrations folder, applying schema.prisma
          # should produce ZERO additional changes. If it doesn't, schema.prisma
          # changed without a corresponding migration — block the PR.
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url "$SHADOW_DATABASE_URL" \
            --exit-code \
            && echo "PASS: schema.prisma is in sync with prisma/migrations" \
            || (echo "::error::schema.prisma changed but no migration was added. Run: npx prisma migrate dev --name <descriptive-name>" && exit 1)

  # ── Next.js production build sanity ──────────────────────────────────────
  build:
    name: next build (production sanity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install Node dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Build
        # DATABASE_URL is a dummy here — Next.js build does not connect to the
        # DB; it only needs the env var present for the prisma client init.
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: npx next build

  # ── Boot + probe the built artifact (GAP-T1 / doctrine §4.1) ─────────────
  # "next build passes" is not proof of life: elsewhere, hundreds of unit
  # tests missed production crash-loops because nothing ever STARTED the
  # artifact. This job migrates a real Postgres, builds, boots `next start`,
  # and probes the running server — including proof that the
  # instrumentation.ts self-seed hook actually fires (LESSONS #11: it once
  # silently never ran for weeks).
  boot-probe:
    name: boot + probe built artifact
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: boot
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/boot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install Node dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Apply migrations to scratch DB
        run: npx prisma migrate deploy
      - name: Precompute stats (against live scratch DB)
        run: npm run precompute
      - name: Build
        run: npx next build
      - name: Boot and probe
        run: |
          set -euo pipefail
          npx next start -p 3000 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          # 1. Server answers within 60s (instrumentation seed may run first)
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000/api/health > /dev/null && break
            if [ "$i" = "60" ]; then echo "::error::server never answered /api/health"; exit 1; fi
            sleep 1
          done

          # 2. Health is honest: process up AND database reachable
          HEALTH=$(curl -sf http://localhost:3000/api/health)
          echo "health: $HEALTH"
          test "$(echo "$HEALTH" | jq -r .ok)" = "true" || { echo "::error::health .ok != true"; exit 1; }
          test "$(echo "$HEALTH" | jq -r .dbReachable)" = "true" || { echo "::error::health .dbReachable != true — app booted but cannot see its DB"; exit 1; }

          # 3. The startup self-seed hook must actually fire (pins LESSONS #11):
          #    poll until the API serves at least one program from the scratch DB.
          TOTAL=0
          for i in $(seq 1 45); do
            TOTAL=$(curl -sf "http://localhost:3000/api/incentives?pageSize=1" | jq -r '.total // 0' || echo 0)
            [ "${TOTAL:-0}" -ge 1 ] && break
            sleep 2
          done
          if [ "${TOTAL:-0}" -lt 1 ]; then
            echo "::error::no programs visible after 90s — instrumentation.ts self-seed did not run"
            exit 1
          fi
          echo "self-seed verified: $TOTAL programs visible through the API"

          # 4. Relational probe (doctrine §4.5): detail endpoint returns the
          #    same program the list endpoint served — no literal pins.
          LIST=$(curl -sf "http://localhost:3000/api/incentives?pageSize=1")
          SLUG=$(echo "$LIST" | jq -r '.data[0].slug')
          LIST_TITLE=$(echo "$LIST" | jq -r '.data[0].title')
          DETAIL_TITLE=$(curl -sf "http://localhost:3000/api/incentives/$SLUG" | jq -r '.title')
          test "$DETAIL_TITLE" = "$LIST_TITLE" || { echo "::error::list/detail disagree for $SLUG: '$LIST_TITLE' vs '$DETAIL_TITLE'"; exit 1; }

          # 5. Real pages render (a crashing page returns non-200 in prod mode)
          for P in "/" "/incentives/$SLUG" "/methodology"; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3000$P")
            test "$CODE" = "200" || { echo "::error::GET $P returned $CODE"; exit 1; }
            echo "GET $P -> 200"
          done

          echo "PASS: artifact boots, sees its DB, self-seeds, and serves real pages"
